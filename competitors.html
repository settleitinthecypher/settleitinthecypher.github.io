            const ThreefoldData = "https://raw.githubusercontent.com/settleitinthecypher/settleitinthecypher.github.io/refs/heads/main/data%2Banalyses/webscrape/csv/Webscraping%20-%20Battles%20%5Band8%20Threefold%5D%20(Raw).csv";
            const PseudoThreefoldData = "https://raw.githubusercontent.com/settleitinthecypher/settleitinthecypher.github.io/refs/heads/main/data%2Banalyses/webscrape/csv/Webscraping%20-%20Battles%20%5BWDSF%20Pseudo%20Threefold%5D%20(Raw).csv";

                        categoryAbbreviations = ['tech','vari','perf','musi','crea','pers'];

                    case "WDSF System":

                        categories = ['Technique','Vocabulary','Originality','Execution','Musicality'];
                        categoryAbbreviations = ['tech','voca','orig','exec','musi'];
                        break;
                    case "Threefold":

                        break;
                    case "WDSF Pseudo Threefold":

                    from pyodide.http import open_url
                    import pandas as pd
                    import numpy as np
                    from js import document

                            '(' + str(round(100 * df_RoundsJudges['count'][2] / df_RoundsJudges['count'][0])) + '%)',
                            '(' + str(round(100 * df_RoundsJudges['count'][3] / df_RoundsJudges['count'][0])) + '%)',
                            '(' + str(round(100 * df_RoundsJudges['count'][4] / df_RoundsJudges['count'][0])) + '%)',
                            '(' + str(round(100 * df_RoundsJudges['count'][5] / df_RoundsJudges['count'][0])) + '%)',

                        df_RoundsJudges['3 judges'] = [

                            '(' + str(round(100 * df_RoundsJudges['3 judges'][1] / df_RoundsJudges['count'][0])) + '%)',
                            '(' + str(round(100 * df_RoundsJudges['3 judges'][2] / df_RoundsJudges['count'][0])) + '%)',
                            '(' + str(round(100 * df_RoundsJudges['3 judges'][3] / df_RoundsJudges['count'][0])) + '%)',
                            '(' + str(round(100 * df_RoundsJudges['3 judges'][4] / df_RoundsJudges['count'][0])) + '%)',
                            '(' + str(round(100 * df_RoundsJudges['3 judges'][5] / df_RoundsJudges['count'][0])) + '%)',
                        ]
                        df_RoundsJudges['5 judges'] = [
                            (df['number of judges'] == 5).sum(),
                            ((df['number of judges'] == 5) & (df['battle rounds'] == 1)).sum(),
                            ((df['number of judges'] == 5) & (df['battle rounds'] == 2)).sum(),

                            ((df['number of judges'] == 5) & (df['battle rounds'] == 4)).sum(),
                            ((df['number of judges'] == 5) & (df['battle rounds'] == 5)).sum()
                        ]
                        df_RoundsJudges['5 judges %'] = [
                            '(' + str(round(100 * df_RoundsJudges['5 judges'][0] / df_RoundsJudges['count'][0])) + '%)',
                            '(' + str(round(100 * df_RoundsJudges['5 judges'][1] / df_RoundsJudges['count'][0])) + '%)',
                            '(' + str(round(100 * df_RoundsJudges['5 judges'][2] / df_RoundsJudges['count'][0])) + '%)',

                            ((df['number of judges'] == 7) & (df['battle rounds'] == 2)).sum(),
                            ((df['number of judges'] == 7) & (df['battle rounds'] == 3)).sum(),
                            ((df['number of judges'] == 7) & (df['battle rounds'] == 4)).sum(),
                            ((df['number of judges'] == 7) & (df['battle rounds'] == 5)).sum()
                        ]
                        df_RoundsJudges['7 judges %'] = [
                            '(' + str(round(100 * df_RoundsJudges['7 judges'][0] / df_RoundsJudges['count'][0])) + '%)',
                            '(' + str(round(100 * df_RoundsJudges['7 judges'][1] / df_RoundsJudges['count'][0])) + '%)',
                            '(' + str(round(100 * df_RoundsJudges['7 judges'][2] / df_RoundsJudges['count'][0])) + '%)',
                            '(' + str(round(100 * df_RoundsJudges['7 judges'][3] / df_RoundsJudges['count'][0])) + '%)',
                            '(' + str(round(100 * df_RoundsJudges['7 judges'][4] / df_RoundsJudges['count'][0])) + '%)',
                            '(' + str(round(100 * df_RoundsJudges['7 judges'][5] / df_RoundsJudges['count'][0])) + '%)',
                        ]
                        df_RoundsJudges['9 judges'] = [
                            (df['number of judges'] == 9).sum(),
                            ((df['number of judges'] == 9) & (df['battle rounds'] == 1)).sum(),
                            ((df['number of judges'] == 9) & (df['battle rounds'] == 2)).sum(),
                            ((df['number of judges'] == 9) & (df['battle rounds'] == 3)).sum(),
                            ((df['number of judges'] == 9) & (df['battle rounds'] == 4)).sum(),
                            ((df['number of judges'] == 9) & (df['battle rounds'] == 5)).sum()
                        ]
                        df_RoundsJudges['9 judges %'] = [
                            '(' + str(round(100 * df_RoundsJudges['9 judges'][0] / df_RoundsJudges['count'][0])) + '%)',
                            '(' + str(round(100 * df_RoundsJudges['9 judges'][1] / df_RoundsJudges['count'][0])) + '%)',
                            '(' + str(round(100 * df_RoundsJudges['9 judges'][2] / df_RoundsJudges['count'][0])) + '%)',
                            '(' + str(round(100 * df_RoundsJudges['9 judges'][3] / df_RoundsJudges['count'][0])) + '%)',
                            '(' + str(round(100 * df_RoundsJudges['9 judges'][4] / df_RoundsJudges['count'][0])) + '%)',
                            '(' + str(round(100 * df_RoundsJudges['9 judges'][5] / df_RoundsJudges['count'][0])) + '%)',
                        ]
                        df_RoundsJudges = df_RoundsJudges.rename(columns={
                            '':'',
                            '%':'%',
                            '3 judges':'3 judges',
                            '3 judges %':'',
                            '5 judges':'5 judges',
                            '5 judges %':'',
                            '7 judges':'7 judges',
                            '7 judges %':'',
                            '9 judges':'9 judges',
                            '9 judges %':'',
                        })
                        roundsJudges_table = df_RoundsJudges.to_html(classes='table table-striped table-hover')
                        document.getElementById('roundsJudgesTableDiv').innerHTML = roundsJudges_table
                        
                        document.getElementById('descriptiveStatistics').style.display = 'initial';
                        document.getElementById("loadingPlaceholder").innerHTML = ''

                    except Exception as e:
                        document.getElementById("rawDataTableDiv").innerHTML = "<p>Error loading data: " + str(e) + "</p>"
                    `;
                document.querySelector('section.pyscript').appendChild(script); // append script element to trigger PyScript code execution engine

            }

            document.getElementById('rawDataTableDiv').addEventListener('click', function (event) {
                const tr = event.target.closest('tr');
                if (!tr) return; // click wasn't on a row
                
                // Get the table headers (assuming first row with th elements)
                const table = tr.closest('table');
                const headerRow = table.querySelector('thead tr') || table.querySelector('tr:first-child');
                const headers = Array.from(headerRow.querySelectorAll('th, td')).map(h => h.textContent.trim());
                
                // Get row data
                var rowArray = tr.textContent.split('\n');
                for (var i = 0; i < rowArray.length; i++) {
                    rowArray[i] = rowArray[i].trim();
                    if (rowArray[i] == "NaN") rowArray[i] = '';
                }
                rowArray.splice(0,1);
                
                // Create JSON object mapping headers to row values
                const rowJSON = {};
                headers.forEach((header, index) => {
                    if (rowArray[index]) {
                        rowJSON[header] = rowArray[index];
                    }
                });
                console.log(JSON.stringify(rowJSON, null, 2));
