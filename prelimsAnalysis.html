        <script>
            function loadPage() {
                populateDropdown();
                populatePlaceholder();
                parseURL();
            }
            
            function populateDropdown() {
                var eventDropdownMenu = document.getElementById('eventDropdownMenu');
                var tempLi;
                for (var key in dataJSON) {
                    tempLi = document.createElement('li');
                    tempLi.innerHTML = '<a class="dropdown-item" onclick="loadEvent(this.innerText);">' + dataJSON[key]['name'] + '</a>';
                    eventDropdownMenu.appendChild(tempLi);
                }
            }
            
            function populatePlaceholder() {
                document.getElementById('CSVDataTextarea').placeholder = 'paste data as csv here\n' + '\n' + 'example (spaces added for visual):\n' + ' ,   , j1 ,    ,    ,    , j2 ,    ,    ,    , j3 ,    ,    ,    ,\n' + '1, c1, 5.0, 6.0, 4.0, 5.0, 5.5, 5.5, 4.0, 5.0, 5.5, 6.0, 5.0, 5.5,\n' + '...';
            }
            
            function parseURL() {
                if (window.location.href.includes('?event=')) {
                    for (var key in dataJSON) {
                        if (dataJSON[key]['alias'] == window.location.href.split('?event=')[1]) {
                            loadEvent(dataJSON[key]['name']);
                            break;
                        }
                    }
                }
            }
            
            function expandCollapseSection(button, section) {
                if (button.innerText == '▼') {
                    button.innerText = '▲';
                }
                else {
                    button.innerText = '▼';
                }
                const collapseElementList = section.getElementsByClassName('collapse');
                const collapseList = [...collapseElementList].map(collapseEl => new bootstrap.Collapse(collapseEl));
            }
            
            function loadEvent(event) {
                document.getElementById('eventDropdownButton').innerText = 'Event: ' + event;
                document.getElementById('CSVDataTextarea').value = dataJSON[event]['CSV'];
                var outputsDivs = document.getElementById('outputsDiv').children;
                for (var i = 0; i < outputsDivs.length; i++) {
                    outputsDivs[i].innerHTML = '';
                }
                
                //    <ul id='mainNavUl' class="nav nav-tabs" onclick='mainNavToggle(event);'>

                document.getElementById('linksDiv').innerHTML = '<p>Link to data source: <a href="' + dataJSON[event]['link'] + '" target="_blank">' + dataJSON[event]['link'] + '</a></p>';
                document.getElementById('linksDiv').innerHTML += '<p>Link to video: <a href="' + dataJSON[event]['video'] + '" target="_blank">' + dataJSON[event]['video'] + '</a></p>';
                runAnalysis();
                window.history.pushState({}, '', window.location.pathname + '?event=' + dataJSON[event]['alias']);
            }

            // this is same as from index_javascript
            function generateTableFromArray(array, numHeaderRows, numHeaderColumns) {
                console.log('** generateTableFromArray **');
                var table = document.createElement('table');
                table.classList = 'table table-sm table-striped table-hover';
                var headerRow = document.createElement('thead');
                var row;
                var cell;
                
                // create table header rows if have them
                if (numHeaderRows > 0) {
                    for (var y = 0; y < numHeaderRows; y++) {
                        row = document.createElement('tr');
                        for (var x = 0; x < array[y].length; x++) {
                            cell = document.createElement('th');
                            cell.setAttribute('scope','col');
                            cell.innerText = array[y][x];
                            row.appendChild(cell);
                        }
                        headerRow.appendChild(row);
                    }
                    table.appendChild(headerRow);
                }
                
                // create table body
                var tableBody = document.createElement('tbody');
                for (var y = numHeaderRows; y < array.length; y++) {
                    row = document.createElement('tr');
                    
                    // create row headers if have them
                    for (var x = 0; x < numHeaderColumns; x++) {
                        cell = document.createElement('th');
                        cell.setAttribute('scope','row');
                        cell.innerText = array[y][x];
                        row.appendChild(cell);
                    }
                    for (var x = numHeaderColumns; x < array[y].length; x++) {
                        cell = document.createElement('td');
                        cell.innerText = array[y][x];
                        row.appendChild(cell);
                    }
                    tableBody.appendChild(row);
                }
                table.appendChild(tableBody);
                return table;
            }
            
            function styleDataTable() {
                var dataTable = document.getElementById('dataTable');
                
                // merge header judge cells
                if (numRounds > 1) {
                    var deleteCells = [];
                    for (var i = 0; i < judgeColumns.length; i++) {
                        for (var j = 1; j <= numRounds; j++) {
                            deleteCells.push(judgeColumns[i] + j);
                        }
                    }
                    
                    var ths = dataTable.getElementsByTagName('tr')[0].getElementsByTagName('th');
                    for (var i = 0; i < judgeColumns.length; i++) {
                        ths[judgeColumns[i]].setAttribute('colspan', numRounds + 1);
                    }
                    for (var i = deleteCells.length - 1; i >= 0; i--) {
                        ths[deleteCells[i]].remove();
                    }
                }
                
                // add left side border to judge columns
                var headerRows = dataTable.getElementsByTagName('thead')[0].getElementsByTagName('tr');
                if (numRounds > 1) {
                    var topRowCells = headerRows[0].getElementsByTagName('th');
                    for (var i = 0; i < topRowCells.length; i++) {
                        if (topRowCells[i].innerText) {
                            topRowCells[i].classList.add('border-start');
                        }
                    }
                }
                var headerRow = headerRows[headerRows.length - 1];
                ths = headerRow.getElementsByTagName('th');
                for (var j = 0; j < judgeColumns.length; j++) {
                    ths[judgeColumns[j]].classList.add('border-start');
                }
                var bodyRows = dataTable.getElementsByTagName('tbody')[0].getElementsByTagName('tr');
                for (var i = 0; i < bodyRows.length; i++) {
                    for (var j = 0; j < judgeColumns.length; j++) {
                        bodyRows[i].children[judgeColumns[j]].classList.add('border-start');
                    }
                }
                
                // highlight overall cells
                var overallColumns = [];
                for (var i = 0; i < ths.length; i++) {
                    if (ths[i].innerText == 'Overall') {
                        overallColumns.push(i);
                    }
                }
                for (var i = 0; i < bodyRows.length; i++) {
                    for (var j = 0; j < overallColumns.length; j++) {
                        bodyRows[i].children[overallColumns[j]].classList.add('table-active');
                    }
                }
                
                // style crew members names
                var crewName;
                if (bodyRows[0].children[1].innerText.includes('|')) {
                    for (var i = 0; i < bodyRows.length; i++) {
                        crewName = bodyRows[i].children[1].innerText;
                        bodyRows[i].children[1].innerText = crewName.replaceAll(/[|;]/g,'\n- ');
                    }
                }
                
                // TODO: add link to judges' pages
                
                // add sort button to column headers
                ths[0].innerHTML = ths[0].innerHTML + '<button class="btn btn-sm" onclick="sortColumn(this)">▲</button>';
                for (var i = 1; i < ths.length; i++) {
                    ths[i].innerHTML = ths[i].innerHTML + '<button class="btn btn-sm text-secondary" onclick="sortColumn(this)">▽</button>';
                }
            }
            
            function sortColumn(sortButton) {
                // update button caret according to which one was clicked
                var dataTable = document.getElementById('dataTable');
                var sortButtons = dataTable.getElementsByTagName('button');
                switch(sortButton.innerText) {
                    case '▲':
                        sortButton.innerText = '▼';
                        break;
                    case '▼':
                        sortButton.innerText = '▲';
                        break;
                    case '▽':
                        for (var i = 0; i < sortButtons.length; i++) {
                            sortButtons[i].innerText = '▽';
                            sortButtons[i].classList.add('text-secondary');
                        }
                        sortButton.innerText = '▼';
                        sortButton.classList.remove('text-secondary');
                        break;
                }
                
                // sort column and update table accordingly
                var column = Array.from(sortButtons).indexOf(sortButton);
                var rows = dataTable.getElementsByTagName('tbody')[0].getElementsByTagName('tr');
                var sortingArray = []; // create an array of arrays containing row number and value in column being sorted
                for (var i = 0; i < rows.length; i++) {
                    sortingArray.push([i,rows[i].children[column].innerText]);
                }
                for (var i = 0; i < sortingArray.length; i++) {
                    if (sortingArray[i][1]) {
                        break;
                    }
                }
                if (!Number.isNaN(Number(sortingArray[i][1]))) { // check whether column being sorted is numerical or string for appropriate comparison function
                    if (sortButton.innerText == '▼') {
                        sortingArray.sort((a,b) => b[1] - a[1]);
                    }
                    else {
                        sortingArray.sort((a,b) => a[1] - b[1]);
                    }
                }
                else {
                    if (sortButton.innerText == '▼') {
                        sortingArray.sort((a,b) => b[1].localeCompare(a[1]));
                    }
                    else {
                        sortingArray.sort((a,b) => a[1].localeCompare(b[1]));
                    }
                }
                var tempTbody = document.createElement('tbody'); // create a temporary element to copy rows to then pull from when updating table
                for (var i = 0; i < rows.length; i++) {
                    tempTbody.appendChild(rows[i].cloneNode(true));
                }
                dataTable.getElementsByTagName('tbody')[0].innerHTML = ''; // update the table with sorted rows
                for (var i = 0; i < sortingArray.length; i++) {
                    dataTable.getElementsByTagName('tbody')[0].appendChild(tempTbody.getElementsByTagName('tr')[sortingArray[i][0]].cloneNode(true));
                }
                tempTbody.remove();
            }

                var sortedArray;
                sortedArrays = [];
                var modeArray;
                modeArrays = [];
                var found = false;
                var maxCount;
                var modes;
                var mean;
                for (var i = 0; i < judges.length; i++) {
                    descriptiveStatsArray[0].push(judges[i]);
                    
                    sortedArray = [...combinedScoresArray[i]].filter(val => val !== '').map(Number).sort((a,b) => a - b);
                    sortedArrays.push(sortedArray);
                    
                    descriptiveStatsArray[1].push(sortedArray[sortedArray.length - 1]);
                    
                    sortedArrayMiddleIndex = Math.floor(sortedArray.length / 2);
                    if (sortedArray.length % 2 != 0) {
                        descriptiveStatsArray[2].push(sortedArray[sortedArrayMiddleIndex]);
                    }
                    else {
                        descriptiveStatsArray[2].push((sortedArray[sortedArrayMiddleIndex - 1] + sortedArray[sortedArrayMiddleIndex]) / 2);
                    }
                    
                    descriptiveStatsArray[3].push(sortedArray[0]);
                    descriptiveStatsArray[4].push(descriptiveStatsArray[1][i + 1] - descriptiveStatsArray[3][i + 1]);
                    
                    modeArray = [];
                    for (var j = 0; j < sortedArray.length; j++) {
                        found = false;
                        for (var k = 0; k < modeArray.length; k++) {
                            if (modeArray[k][0] == sortedArray[j]) {
                                found = true;
                                break;
                            }
                        }
                        if (found) {
                            modeArray[k][1] += 1;
                        }
                        else {
                            modeArray.push([sortedArray[j], 1]);
                        }
                    }
                    modeArrays.push(modeArray);
                    maxCount = 0;
                    for (var j = 0; j < modeArray.length; j++) {
                        if (modeArray[j][1] > maxCount) {
                            maxCount = modeArray[j][1];
                        }
                    }
                    modes = '';
                    for (var j = 0; j < modeArray.length; j++) {
                        if (modeArray[j][1] == maxCount) {
                            modes += modeArray[j][0] + ', ';
                        }
                    }
                    modes = modes.slice(0, -2);
                    descriptiveStatsArray[5].push(modes);
                    
                    mean = sortedArray.reduce((a, b) => a + b) / sortedArray.length;
                    descriptiveStatsArray[6].push((Math.round(mean * 100) / 100).toFixed(2));
                    descriptiveStatsArray[7].push((Math.round(Math.sqrt(sortedArray.map(x => (x - mean) ** 2).reduce((sum, x) => sum + x, 0) / (sortedArray.length - 1))* 100) / 100).toFixed(2)); // sample std dev
                }
                document.getElementById('descriptiveStatsDiv').appendChild(generateTableFromArray(descriptiveStatsArray, 1, 1));
                
                // remove same indexes if any are null
                // then run anova comparing each judge to each other
            }            
        </script>
        <script type='module'>
            import * as Plot from 'https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6/+esm';
            
            function generateGraphs() {
                // TODO: special handling x-axis values for Cypher Minds because Fleau went to 0.1 points precision
                
                var incrementsX = [];
                for (var i = 0; i <= 10.5; i += 0.5) {
                    incrementsX.push(i);
                }
                
                var maxCount = 0;
                for (var i = 0; i < modeArrays.length; i++) {
                    for (var j = 0; j < modeArrays[i].length; j++) {
                        if (modeArrays[i][j][1] > maxCount) {
                            maxCount = modeArrays[i][j][1];
                        }
                    }
                }
                maxCount = Math.ceil(maxCount / 5) * 5;
                var incrementsY = [];
                for (var i = 0; i <= maxCount; i++) {
                    incrementsY.push(i);
                }
                
                var graphsDiv = document.getElementById('graphsDiv');
                var judgeNameDiv;
                var graphData;
                var graphDiv;
                for (var i = 0; i < judges.length; i++) {
                    judgeNameDiv = document.createElement('div');
                    judgeNameDiv.innerText = judges[i];
                    graphDiv = document.createElement('div');
                    graphData = modeArrays[i].map(([score, count]) => ({
                        score,
                        count,
                        x1: score - 0.25,
                        x2: score + 0.25
                    }));
                    var plot = Plot.plot({
                        x: {
                            domain: [0, 10.5],
                            label: 'Score',
                            tickFormat: d => d.toFixed(1),
                            ticks: incrementsX,
                            type: 'linear'
                        },
                        y: {
                            domain: [0, maxCount],
                            grid: true,
                            label: 'Count',
                            ticks: incrementsY
                        },
                        marks: [
                            Plot.rectY(graphData, {
                                x1: 'x1',
                                x2: 'x2',
                                y: 'count'
                            }),
                            Plot.text(graphData, {
                                x: 'score',
                                y: 'count',
                                text: 'count',
                                dy: -6,
                                lineAnchor: 'bottom'
                            }),
                        ],
                        style: {fontSize: '0.75rem'}
                    });
                    graphDiv.appendChild(judgeNameDiv);
                    graphDiv.appendChild(plot);
                    graphsDiv.appendChild(graphDiv);
                }
            }
            window.generateGraphs = generateGraphs;
        </script>
